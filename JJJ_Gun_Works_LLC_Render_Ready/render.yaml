services:
  - type: web
    name: jjj-gun-works-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jjj-gun-works-db
          property: connectionString
      - key: APP_NAME
        value: Firearms Inventory API
      - key: APP_ENV
        value: production
      - key: API_PREFIX
        value: /api
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://localhost:3000

databases:
  - name: jjj-gun-works-db
    databaseName: firearms_inventory
    user: firearms_app
    plan: starter
